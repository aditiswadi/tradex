services:
  postgres:
    image: postgres:15
    container_name: tradex_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradex_db
    ports:
      - "5432:5432"
    volumes:
      - tradex_postgres:/var/lib/postgresql/data
    networks:
      - tradex_network

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: tradex_pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin4@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - tradex_pgadmin:/var/lib/pgadmin
    networks:
      - tradex_network

volumes:
  tradex_postgres:
  tradex_pgadmin:

networks:
  tradex_network:
    driver: bridge
